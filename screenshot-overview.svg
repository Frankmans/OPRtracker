<svg viewBox="0 0 1000 660" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, Menlo, monospace">
  <defs>
    <style>
      .bg { fill: #0a0e0c; }
      .panel { fill: #10160f; stroke: #223026; stroke-width: 1; }
      .panelAlt { fill: #161d19; stroke: #223026; stroke-width: 1; }
      .text { fill: #d7f5e6; font-family: Inter, sans-serif; }
      .muted { fill: #6b8579; font-family: Inter, sans-serif; }
      .mono { fill: #d7f5e6; font-family: 'JetBrains Mono', monospace; }
      .mutedMono { fill: #6b8579; font-family: 'JetBrains Mono', monospace; letter-spacing: 1px; }
      .green { fill: #00e08a; }
      .amber { fill: #ffb703; }
      .red { fill: #ff5d5d; }
      .cyan { fill: #3ec6ff; }
      .rowLine { stroke: #223026; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" width="1000" height="660"/>

  <!-- Header -->
  <text x="30" y="40" class="mutedMono" font-size="10">// PORTAL SUBMISSION LOG</text>
  <text x="30" y="66" class="mono" font-size="22" font-weight="700">PORTAL SUBMISSION TRACKER</text>
  <text x="30" y="86" class="muted" font-size="12">Track every Wayspot nomination, photo, and edit you've submitted.</text>

  <!-- Stat cards -->
  <g>
    <rect x="30" y="104" width="226" height="64" rx="6" class="panel"/>
    <text x="46" y="136" class="mono" font-size="24" font-weight="700">58</text>
    <text x="46" y="154" class="mutedMono" font-size="9">TOTAL</text>

    <rect x="268" y="104" width="226" height="64" rx="6" class="panel"/>
    <text x="284" y="136" class="mono amber" font-size="24" font-weight="700">37</text>
    <text x="284" y="154" class="mutedMono" font-size="9">PENDING</text>

    <rect x="506" y="104" width="226" height="64" rx="6" class="panel"/>
    <text x="522" y="136" class="mono green" font-size="24" font-weight="700">18</text>
    <text x="522" y="154" class="mutedMono" font-size="9">ACCEPTED</text>

    <rect x="744" y="104" width="226" height="64" rx="6" class="panel"/>
    <text x="760" y="136" class="mono red" font-size="24" font-weight="700">3</text>
    <text x="760" y="154" class="mutedMono" font-size="9">REJECTED / DUP.</text>
  </g>

  <!-- Controls row -->
  <rect x="30" y="184" width="210" height="32" rx="5" class="panelAlt"/>
  <text x="42" y="205" class="muted" font-size="11.5">Search by portal name…</text>

  <rect x="252" y="190" width="12" height="12" rx="2" fill="none" stroke="#00e08a"/>
  <path d="M254 196 l3 3 l6 -7" stroke="#00e08a" stroke-width="1.5" fill="none"/>
  <text x="270" y="200" class="muted" font-size="10.5">Include legacy Wayfarer-only entries</text>

  <rect x="30" y="222" width="96" height="30" rx="5" class="panelAlt"/>
  <text x="42" y="241" class="mono" font-size="10.5">Parse email</text>

  <rect x="134" y="222" width="98" height="30" rx="5" class="panelAlt"/>
  <text x="146" y="241" class="mono" font-size="10.5">Import JSON</text>

  <rect x="240" y="222" width="86" height="30" rx="5" class="panelAlt"/>
  <text x="252" y="241" class="mono" font-size="10.5">Export CSV</text>

  <rect x="334" y="222" width="118" height="30" rx="5" fill="#00e08a"/>
  <text x="346" y="241" font-size="10.5" font-family="'JetBrains Mono', monospace" font-weight="700" fill="#04140d">+ Add submission</text>

  <rect x="460" y="222" width="76" height="30" rx="5" fill="none" stroke="#ff5d5d"/>
  <text x="472" y="241" class="red" font-size="10.5" font-family="'JetBrains Mono', monospace">Clear all</text>

  <!-- Table -->
  <rect x="30" y="270" width="940" height="300" rx="6" class="panel"/>

  <!-- header row with filter carets -->
  <text x="46" y="292" class="mutedMono" font-size="10">PORTAL</text>

  <text x="370" y="292" class="mutedMono" font-size="10">TYPE</text>
  <text x="402" y="292" class="cyan" font-size="9">▾</text>

  <text x="470" y="292" class="mutedMono" font-size="10">SUBMITTED</text>
  <text x="534" y="292" class="muted" font-size="9">▾</text>

  <text x="590" y="292" class="mutedMono" font-size="10">STATUS</text>
  <text x="632" y="292" class="cyan" font-size="9">▾</text>

  <text x="690" y="292" class="mutedMono" font-size="10">UPDATED</text>
  <text x="746" y="292" class="muted" font-size="9">▾</text>

  <text x="800" y="292" class="mutedMono" font-size="10">NOTES</text>
  <line x1="30" y1="304" x2="970" y2="304" class="rowLine"/>

  <!-- rows: example / placeholder data only -->
  <g>
    <text x="46" y="332" class="text" font-size="13" font-weight="600">Example Mural</text>
    <rect x="370" y="319" width="76" height="19" rx="3" fill="none" stroke="#6b8579"/>
    <text x="378" y="332" class="muted" font-size="9" font-family="'JetBrains Mono', monospace">NOMINATION</text>
    <text x="470" y="332" class="text" font-size="12">2026-04-02</text>
    <rect x="590" y="319" width="66" height="19" rx="3" fill="#161d19" stroke="#ffb703"/>
    <text x="598" y="332" class="amber" font-size="9" font-family="'JetBrains Mono', monospace">PENDING ▾</text>
    <text x="690" y="332" class="text" font-size="12">2026-04-02</text>
    <text x="800" y="332" class="muted" font-size="12">—</text>
    <line x1="30" y1="346" x2="970" y2="346" class="rowLine"/>
  </g>

  <g>
    <text x="46" y="372" class="text" font-size="13" font-weight="600">Sample Footbridge</text>
    <rect x="370" y="359" width="76" height="19" rx="3" fill="none" stroke="#6b8579"/>
    <text x="378" y="372" class="muted" font-size="9" font-family="'JetBrains Mono', monospace">NOMINATION</text>
    <text x="470" y="372" class="text" font-size="12">2026-03-18</text>
    <rect x="590" y="359" width="70" height="19" rx="3" fill="none" stroke="#00e08a"/>
    <text x="598" y="372" class="green" font-size="9" font-family="'JetBrains Mono', monospace">ACCEPTED</text>
    <text x="690" y="372" class="text" font-size="12">2026-03-25</text>
    <text x="800" y="372" class="muted" font-size="12">—</text>
    <line x1="30" y1="386" x2="970" y2="386" class="rowLine"/>
  </g>

  <g>
    <text x="46" y="412" class="text" font-size="13" font-weight="600">Demo Playground</text>
    <rect x="370" y="399" width="44" height="19" rx="3" fill="none" stroke="#3ec6ff"/>
    <text x="378" y="412" class="cyan" font-size="9" font-family="'JetBrains Mono', monospace">PHOTO</text>
    <text x="470" y="412" class="text" font-size="12">2026-03-11</text>
    <rect x="590" y="399" width="66" height="19" rx="3" fill="none" stroke="#ffb703"/>
    <text x="598" y="412" class="amber" font-size="9" font-family="'JetBrains Mono', monospace">PENDING</text>
    <text x="690" y="412" class="text" font-size="12">2026-03-11</text>
    <text x="800" y="412" class="muted" font-size="12">—</text>
    <line x1="30" y1="426" x2="970" y2="426" class="rowLine"/>
  </g>

  <g>
    <text x="46" y="452" class="text" font-size="13" font-weight="600">Placeholder Garden</text>
    <rect x="370" y="439" width="88" height="19" rx="3" fill="none" stroke="#ffb703"/>
    <text x="378" y="452" class="amber" font-size="9" font-family="'JetBrains Mono', monospace">EDIT · TITLE</text>
    <text x="470" y="452" class="text" font-size="12">2026-02-27</text>
    <rect x="590" y="439" width="70" height="19" rx="3" fill="none" stroke="#ff5d5d"/>
    <text x="598" y="452" class="red" font-size="9" font-family="'JetBrains Mono', monospace">REJECTED</text>
    <text x="690" y="452" class="text" font-size="12">2026-03-01</text>
    <text x="800" y="452" class="muted" font-size="11">Suggested rename not accepted</text>
    <line x1="30" y1="466" x2="970" y2="466" class="rowLine"/>
  </g>

  <g>
    <text x="46" y="492" class="text" font-size="13" font-weight="600">Test Trailhead Sign</text>
    <rect x="370" y="479" width="76" height="19" rx="3" fill="none" stroke="#6b8579"/>
    <text x="378" y="492" class="muted" font-size="9" font-family="'JetBrains Mono', monospace">NOMINATION</text>
    <text x="470" y="492" class="text" font-size="12">2026-02-14</text>
    <rect x="590" y="479" width="66" height="19" rx="3" fill="none" stroke="#3ec6ff"/>
    <text x="598" y="492" class="cyan" font-size="9" font-family="'JetBrains Mono', monospace">APPEAL</text>
    <text x="690" y="492" class="text" font-size="12">2026-04-05</text>
    <text x="800" y="492" class="muted" font-size="12">—</text>
  </g>

  <text x="30" y="586" class="muted" font-size="11">Placeholder data shown for illustration only — no real submissions are included.</text>

  <!-- Example: clicking a status badge opens a quick one-click status changer -->
  <g>
    <rect x="576" y="330" width="150" height="150" rx="6" fill="#10160f" stroke="#223026" stroke-width="1"/>
    <text x="590" y="350" class="mutedMono" font-size="9">CHANGE STATUS</text>

    <circle cx="596" cy="366" r="5" fill="none" stroke="#00e08a" stroke-width="1.4"/>
    <circle cx="596" cy="366" r="2.2" fill="#00e08a"/>
    <text x="608" y="370" class="amber" font-size="9" font-family="'JetBrains Mono', monospace">PENDING</text>

    <circle cx="596" cy="388" r="5" fill="none" stroke="#223026" stroke-width="1.4"/>
    <text x="608" y="392" class="green" font-size="9" font-family="'JetBrains Mono', monospace">ACCEPTED</text>

    <circle cx="596" cy="410" r="5" fill="none" stroke="#223026" stroke-width="1.4"/>
    <text x="608" y="414" class="red" font-size="9" font-family="'JetBrains Mono', monospace">REJECTED</text>

    <circle cx="596" cy="432" r="5" fill="none" stroke="#223026" stroke-width="1.4"/>
    <text x="608" y="436" class="muted" font-size="9" font-family="'JetBrains Mono', monospace">DUPLICATE</text>

    <circle cx="596" cy="454" r="5" fill="none" stroke="#223026" stroke-width="1.4"/>
    <text x="608" y="458" class="cyan" font-size="9" font-family="'JetBrains Mono', monospace">APPEAL</text>
  </g>
  <text x="576" y="498" class="muted" font-size="10">↑ Click any status badge for a one-click change</text>
</svg>
