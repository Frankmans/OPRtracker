<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, Menlo, monospace">
  <defs>
    <style>
      .bg { fill: #0a0e0c; }
      .panel { fill: #10160f; stroke: #223026; stroke-width: 1; }
      .panelAlt { fill: #161d19; stroke: #223026; stroke-width: 1; }
      .text { fill: #d7f5e6; font-family: Inter, sans-serif; }
      .muted { fill: #6b8579; font-family: Inter, sans-serif; }
      .mono { fill: #d7f5e6; font-family: 'JetBrains Mono', monospace; }
      .mutedMono { fill: #6b8579; font-family: 'JetBrains Mono', monospace; letter-spacing: 1px; }
      .green { fill: #00e08a; }
      .amber { fill: #ffb703; }
      .red { fill: #ff5d5d; }
      .cyan { fill: #3ec6ff; }
      .rowLine { stroke: #223026; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" width="900" height="560"/>

  <!-- Header -->
  <text x="30" y="40" class="mutedMono" font-size="10">// PORTAL SUBMISSION LOG</text>
  <text x="30" y="66" class="mono" font-size="22" font-weight="700">PORTAL SUBMISSION TRACKER</text>
  <text x="30" y="86" class="muted" font-size="12">Track every Wayspot nomination you've submitted and where each one stands.</text>

  <!-- Stat cards -->
  <g>
    <rect x="30" y="104" width="200" height="64" rx="6" class="panel"/>
    <text x="46" y="136" class="mono" font-size="24" font-weight="700">47</text>
    <text x="46" y="154" class="mutedMono" font-size="9">TOTAL</text>

    <rect x="242" y="104" width="200" height="64" rx="6" class="panel"/>
    <text x="258" y="136" class="mono amber" font-size="24" font-weight="700">31</text>
    <text x="258" y="154" class="mutedMono" font-size="9">PENDING</text>

    <rect x="454" y="104" width="200" height="64" rx="6" class="panel"/>
    <text x="470" y="136" class="mono green" font-size="24" font-weight="700">14</text>
    <text x="470" y="154" class="mutedMono" font-size="9">ACCEPTED</text>

    <rect x="666" y="104" width="204" height="64" rx="6" class="panel"/>
    <text x="682" y="136" class="mono red" font-size="24" font-weight="700">2</text>
    <text x="682" y="154" class="mutedMono" font-size="9">REJECTED / DUP.</text>
  </g>

  <!-- Controls row -->
  <rect x="30" y="184" width="280" height="32" rx="5" class="panelAlt"/>
  <text x="42" y="205" class="muted" font-size="12">Search by portal name…</text>

  <rect x="322" y="184" width="120" height="32" rx="5" class="panelAlt"/>
  <text x="334" y="205" class="muted" font-size="12">All statuses</text>

  <rect x="612" y="184" width="96" height="32" rx="5" class="panelAlt"/>
  <text x="624" y="205" class="mono" font-size="11">Parse email</text>

  <rect x="716" y="184" width="86" height="32" rx="5" class="panelAlt"/>
  <text x="728" y="205" class="mono" font-size="11">Export CSV</text>

  <rect x="810" y="184" width="60" height="32" rx="5" fill="#00e08a"/>
  <text x="820" y="205" font-size="11" font-family="'JetBrains Mono', monospace" font-weight="700" fill="#04140d">+ Add</text>

  <!-- Table -->
  <rect x="30" y="228" width="840" height="300" rx="6" class="panel"/>

  <!-- header row -->
  <text x="46" y="250" class="mutedMono" font-size="10">PORTAL</text>
  <text x="356" y="250" class="mutedMono" font-size="10">SUBMITTED</text>
  <text x="466" y="250" class="mutedMono" font-size="10">STATUS</text>
  <text x="576" y="250" class="mutedMono" font-size="10">UPDATED</text>
  <text x="686" y="250" class="mutedMono" font-size="10">NOTES</text>
  <line x1="30" y1="262" x2="870" y2="262" class="rowLine"/>

  <!-- rows: example / placeholder data only -->
  <g>
    <text x="46" y="290" class="text" font-size="13" font-weight="600">Example Mural</text>
    <text x="356" y="290" class="text" font-size="13">2026-04-02</text>
    <rect x="466" y="277" width="72" height="20" rx="3" fill="none" stroke="#ffb703"/>
    <text x="476" y="291" class="amber" font-size="10" font-family="'JetBrains Mono', monospace">PENDING</text>
    <text x="576" y="290" class="text" font-size="13">2026-04-02</text>
    <text x="686" y="290" class="muted" font-size="12">—</text>
    <line x1="30" y1="304" x2="870" y2="304" class="rowLine"/>
  </g>

  <g>
    <text x="46" y="330" class="text" font-size="13" font-weight="600">Sample Footbridge</text>
    <text x="356" y="330" class="text" font-size="13">2026-03-18</text>
    <rect x="466" y="317" width="76" height="20" rx="3" fill="none" stroke="#00e08a"/>
    <text x="476" y="331" class="green" font-size="10" font-family="'JetBrains Mono', monospace">ACCEPTED</text>
    <text x="576" y="330" class="text" font-size="13">2026-03-25</text>
    <text x="686" y="330" class="muted" font-size="12">—</text>
    <line x1="30" y1="344" x2="870" y2="344" class="rowLine"/>
  </g>

  <g>
    <text x="46" y="370" class="text" font-size="13" font-weight="600">Demo Playground</text>
    <text x="356" y="370" class="text" font-size="13">2026-03-11</text>
    <rect x="466" y="357" width="72" height="20" rx="3" fill="none" stroke="#ffb703"/>
    <text x="476" y="371" class="amber" font-size="10" font-family="'JetBrains Mono', monospace">PENDING</text>
    <text x="576" y="370" class="text" font-size="13">2026-03-11</text>
    <text x="686" y="370" class="muted" font-size="12">—</text>
    <line x1="30" y1="384" x2="870" y2="384" class="rowLine"/>
  </g>

  <g>
    <text x="46" y="410" class="text" font-size="13" font-weight="600">Placeholder Garden</text>
    <text x="356" y="410" class="text" font-size="13">2026-02-27</text>
    <rect x="466" y="397" width="76" height="20" rx="3" fill="none" stroke="#ff5d5d"/>
    <text x="476" y="411" class="red" font-size="10" font-family="'JetBrains Mono', monospace">REJECTED</text>
    <text x="576" y="410" class="text" font-size="13">2026-03-01</text>
    <text x="686" y="410" class="muted" font-size="12">Duplicate of another nomination</text>
    <line x1="30" y1="424" x2="870" y2="424" class="rowLine"/>
  </g>

  <g>
    <text x="46" y="450" class="text" font-size="13" font-weight="600">Test Trailhead Sign</text>
    <text x="356" y="450" class="text" font-size="13">2026-02-14</text>
    <rect x="466" y="437" width="72" height="20" rx="3" fill="none" stroke="#ffb703"/>
    <text x="476" y="451" class="amber" font-size="10" font-family="'JetBrains Mono', monospace">PENDING</text>
    <text x="576" y="450" class="text" font-size="13">2026-02-14</text>
    <text x="686" y="450" class="muted" font-size="12">—</text>
  </g>

  <text x="30" y="548" class="muted" font-size="11">Placeholder data shown for illustration only — no real submissions are included.</text>
</svg>
