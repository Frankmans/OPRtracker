<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="JetBrains Mono, Menlo, monospace">
  <defs>
    <style>
      .bg { fill: #0a0e0c; }
      .panel { fill: #10160f; stroke: #223026; stroke-width: 1; }
      .panelAlt { fill: #161d19; stroke: #223026; stroke-width: 1; }
      .text { fill: #d7f5e6; font-family: Inter, sans-serif; }
      .muted { fill: #6b8579; font-family: Inter, sans-serif; }
      .mono { fill: #d7f5e6; font-family: 'JetBrains Mono', monospace; }
      .mutedMono { fill: #6b8579; font-family: 'JetBrains Mono', monospace; letter-spacing: 1px; }
      .green { fill: #00e08a; }
      .amber { fill: #ffb703; }
      .red { fill: #ff5d5d; }
      .cyan { fill: #3ec6ff; }
      .rowLine { stroke: #223026; stroke-width: 1; }
    </style>
  </defs>

  <rect class="bg" width="900" height="620"/>

  <!-- Header -->
  <text x="30" y="40" class="mutedMono" font-size="10">// PORTAL SUBMISSION LOG</text>
  <text x="30" y="66" class="mono" font-size="22" font-weight="700">PORTAL SUBMISSION TRACKER</text>
  <text x="30" y="86" class="muted" font-size="12">Track every Wayspot nomination, photo, and edit you've submitted.</text>

  <!-- Stat cards -->
  <g>
    <rect x="30" y="104" width="200" height="64" rx="6" class="panel"/>
    <text x="46" y="136" class="mono" font-size="24" font-weight="700">58</text>
    <text x="46" y="154" class="mutedMono" font-size="9">TOTAL</text>

    <rect x="242" y="104" width="200" height="64" rx="6" class="panel"/>
    <text x="258" y="136" class="mono amber" font-size="24" font-weight="700">37</text>
    <text x="258" y="154" class="mutedMono" font-size="9">PENDING</text>

    <rect x="454" y="104" width="200" height="64" rx="6" class="panel"/>
    <text x="470" y="136" class="mono green" font-size="24" font-weight="700">18</text>
    <text x="470" y="154" class="mutedMono" font-size="9">ACCEPTED</text>

    <rect x="666" y="104" width="204" height="64" rx="6" class="panel"/>
    <text x="682" y="136" class="mono red" font-size="24" font-weight="700">3</text>
    <text x="682" y="154" class="mutedMono" font-size="9">REJECTED / DUP.</text>
  </g>

  <!-- Controls row -->
  <rect x="30" y="184" width="260" height="32" rx="5" class="panelAlt"/>
  <text x="42" y="205" class="muted" font-size="12">Search by portal name…</text>

  <rect x="574" y="184" width="96" height="32" rx="5" class="panelAlt"/>
  <text x="586" y="205" class="mono" font-size="11">Parse email</text>

  <rect x="678" y="184" width="98" height="32" rx="5" class="panelAlt"/>
  <text x="690" y="205" class="mono" font-size="11">Import JSON</text>

  <rect x="784" y="184" width="86" height="32" rx="5" class="panelAlt"/>
  <text x="796" y="205" class="mono" font-size="11">Export CSV</text>

  <!-- Table -->
  <rect x="30" y="230" width="840" height="300" rx="6" class="panel"/>

  <!-- header row with filter carets -->
  <text x="46" y="252" class="mutedMono" font-size="10">PORTAL</text>

  <text x="360" y="252" class="mutedMono" font-size="10">TYPE</text>
  <text x="392" y="252" class="cyan" font-size="9">▾</text>

  <text x="450" y="252" class="mutedMono" font-size="10">SUBMITTED</text>
  <text x="514" y="252" class="muted" font-size="9">▾</text>

  <text x="560" y="252" class="mutedMono" font-size="10">STATUS</text>
  <text x="602" y="252" class="cyan" font-size="9">▾</text>

  <text x="650" y="252" class="mutedMono" font-size="10">UPDATED</text>
  <text x="706" y="252" class="muted" font-size="9">▾</text>

  <text x="756" y="252" class="mutedMono" font-size="10">NOTES</text>
  <line x1="30" y1="264" x2="870" y2="264" class="rowLine"/>

  <!-- rows: example / placeholder data only -->
  <g>
    <text x="46" y="292" class="text" font-size="13" font-weight="600">Example Mural</text>
    <rect x="360" y="279" width="76" height="19" rx="3" fill="none" stroke="#6b8579"/>
    <text x="368" y="292" class="muted" font-size="9" font-family="'JetBrains Mono', monospace">NOMINATION</text>
    <text x="450" y="292" class="text" font-size="12">2026-04-02</text>
    <rect x="560" y="279" width="66" height="19" rx="3" fill="none" stroke="#ffb703"/>
    <text x="568" y="292" class="amber" font-size="9" font-family="'JetBrains Mono', monospace">PENDING</text>
    <text x="650" y="292" class="text" font-size="12">2026-04-02</text>
    <text x="756" y="292" class="muted" font-size="12">—</text>
    <line x1="30" y1="306" x2="870" y2="306" class="rowLine"/>
  </g>

  <g>
    <text x="46" y="332" class="text" font-size="13" font-weight="600">Sample Footbridge</text>
    <rect x="360" y="319" width="76" height="19" rx="3" fill="none" stroke="#6b8579"/>
    <text x="368" y="332" class="muted" font-size="9" font-family="'JetBrains Mono', monospace">NOMINATION</text>
    <text x="450" y="332" class="text" font-size="12">2026-03-18</text>
    <rect x="560" y="319" width="70" height="19" rx="3" fill="none" stroke="#00e08a"/>
    <text x="568" y="332" class="green" font-size="9" font-family="'JetBrains Mono', monospace">ACCEPTED</text>
    <text x="650" y="332" class="text" font-size="12">2026-03-25</text>
    <text x="756" y="332" class="muted" font-size="12">—</text>
    <line x1="30" y1="346" x2="870" y2="346" class="rowLine"/>
  </g>

  <g>
    <text x="46" y="372" class="text" font-size="13" font-weight="600">Demo Playground</text>
    <rect x="360" y="359" width="44" height="19" rx="3" fill="none" stroke="#3ec6ff"/>
    <text x="368" y="372" class="cyan" font-size="9" font-family="'JetBrains Mono', monospace">PHOTO</text>
    <text x="450" y="372" class="text" font-size="12">2026-03-11</text>
    <rect x="560" y="359" width="66" height="19" rx="3" fill="none" stroke="#ffb703"/>
    <text x="568" y="372" class="amber" font-size="9" font-family="'JetBrains Mono', monospace">PENDING</text>
    <text x="650" y="372" class="text" font-size="12">2026-03-11</text>
    <text x="756" y="372" class="muted" font-size="12">—</text>
    <line x1="30" y1="386" x2="870" y2="386" class="rowLine"/>
  </g>

  <g>
    <text x="46" y="412" class="text" font-size="13" font-weight="600">Placeholder Garden</text>
    <rect x="360" y="399" width="88" height="19" rx="3" fill="none" stroke="#ffb703"/>
    <text x="368" y="412" class="amber" font-size="9" font-family="'JetBrains Mono', monospace">EDIT · TITLE</text>
    <text x="450" y="412" class="text" font-size="12">2026-02-27</text>
    <rect x="560" y="399" width="70" height="19" rx="3" fill="none" stroke="#ff5d5d"/>
    <text x="568" y="412" class="red" font-size="9" font-family="'JetBrains Mono', monospace">REJECTED</text>
    <text x="650" y="412" class="text" font-size="12">2026-03-01</text>
    <text x="756" y="412" class="muted" font-size="11">Suggested rename not accepted</text>
    <line x1="30" y1="426" x2="870" y2="426" class="rowLine"/>
  </g>

  <g>
    <text x="46" y="452" class="text" font-size="13" font-weight="600">Test Trailhead Sign</text>
    <rect x="360" y="439" width="76" height="19" rx="3" fill="none" stroke="#6b8579"/>
    <text x="368" y="452" class="muted" font-size="9" font-family="'JetBrains Mono', monospace">NOMINATION</text>
    <text x="450" y="452" class="text" font-size="12">2026-02-14</text>
    <rect x="560" y="439" width="66" height="19" rx="3" fill="none" stroke="#ffb703"/>
    <text x="568" y="452" class="amber" font-size="9" font-family="'JetBrains Mono', monospace">PENDING</text>
    <text x="650" y="452" class="text" font-size="12">2026-02-14</text>
    <text x="756" y="452" class="muted" font-size="12">—</text>
  </g>

  <text x="30" y="546" class="muted" font-size="11">Placeholder data shown for illustration only — no real submissions are included.</text>

  <!-- Example: an open header filter popover, illustrating the Status ▾ capability -->
  <g>
    <rect x="546" y="270" width="150" height="168" rx="6" fill="#10160f" stroke="#223026" stroke-width="1"/>
    <text x="560" y="290" class="mutedMono" font-size="9">FILTER BY STATUS</text>

    <rect x="560" y="302" width="12" height="12" rx="2" fill="none" stroke="#00e08a"/>
    <path d="M562 308 l3 3 l6 -7" stroke="#00e08a" stroke-width="1.5" fill="none"/>
    <text x="580" y="312" class="text" font-size="11">Pending</text>

    <rect x="560" y="324" width="12" height="12" rx="2" fill="none" stroke="#00e08a"/>
    <path d="M562 330 l3 3 l6 -7" stroke="#00e08a" stroke-width="1.5" fill="none"/>
    <text x="580" y="334" class="text" font-size="11">Accepted</text>

    <rect x="560" y="346" width="12" height="12" rx="2" fill="none" stroke="#223026"/>
    <text x="580" y="356" class="text" font-size="11">Rejected</text>

    <rect x="560" y="368" width="12" height="12" rx="2" fill="none" stroke="#223026"/>
    <text x="580" y="378" class="text" font-size="11">Duplicate</text>

    <rect x="560" y="398" width="52" height="24" rx="4" fill="none" stroke="#223026"/>
    <text x="570" y="414" class="muted" font-size="10">Clear</text>

    <rect x="620" y="398" width="56" height="24" rx="4" fill="#00e08a"/>
    <text x="632" y="414" font-size="10" font-weight="700" fill="#04140d">Apply</text>
  </g>

  <text x="546" y="454" class="muted" font-size="10">↑ Clicking a header's ▾ opens a filter like this</text>
</svg>
